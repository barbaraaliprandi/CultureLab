<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CultureLab — Humand</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #1E2B6E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 40px 20px;
  }
  .logo { font-size: 36px; font-weight: 300; color: white; letter-spacing: 4px; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 1px; margin-bottom: 48px; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    width: 260px;
    text-decoration: none;
    transition: transform .2s, box-shadow .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.3); }
  .card-icon { font-size: 40px; }
  .card-title { font-size: 18px; font-weight: 700; color: #1E2B6E; }
  .card-desc { font-size: 13px; color: #6B7280; text-align: center; line-height: 1.5; }
  .card-badge {
    margin-top: 4px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .badge-admin { background: #EEF2FF; color: #4361EE; }
  .badge-mobile { background: #F0FDF4; color: #059669; }
  .footer { margin-top: 48px; font-size: 12px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="logo">humand</div>
<div class="subtitle">CultureLab · Hackathon</div>

<div class="cards">
  <a class="card" href="/admin/">
    <div class="card-icon">🎯</div>
    <div class="card-title">Panel Admin</div>
    <div class="card-desc">Creá y gestioná dinámicas culturales: trivias, pulsos y reconocimientos.</div>
    <div class="card-badge badge-admin">Web · Desktop</div>
  </a>
  <a class="card" href="/mobile/">
    <div class="card-icon">📱</div>
    <div class="card-title">App Mobile</div>
    <div class="card-desc">La experiencia del colaborador: participá, ganá puntos y reconocé a tus colegas.</div>
    <div class="card-badge badge-mobile">Mobile · Empleado</div>
  </a>
</div>

<div class="footer">Powered by Supabase · Hosted on Vercel</div>

</body>
</html>
